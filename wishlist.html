<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<a href="#main-content" class="skip-link">تخطي للمحتوى</a>
<div class="loader hidden" id="app-loader">
  <div class="loader-core"></div>
</div>

<header>
  <div class="header-top">
    <a href="index.html" class="brand">
      <span class="brand-mark">⛩️</span>
      <span>World Of Anime</span>
    </a>
    <div class="search-bar">
      <select id="search-category">
        <option value="" data-i18n="all-categories">كل التصنيفات</option>
        <option value="swords">⚔️ السيوف</option>
        <option value="figures">🗿 المجسمات</option>
        <option value="posters">🖼️ البوسترات</option>
        <option value="tshirts">👕 الملابس</option>
        <option value="accessories">💎 الإكسسوارات</option>
        <option value="manga">📚 المانجا</option>
      </select>
      <input type="text" id="search-input" data-i18n-placeholder="search-placeholder" placeholder="ابحث عن منتجات أنمي...">
      <button id="search-btn">🔍</button>
    </div>
    <div class="header-actions">
      <a href="wishlist.html" class="header-btn">❤️ <span data-i18n="nav-wishlist">المفضلة</span></a>
      <a href="cart.html" class="header-btn">🛒 <span data-i18n="nav-cart">السلة</span><span class="cart-count empty">0</span></a>
      <a href="profile.html" class="header-btn">👤 <span data-i18n="nav-profile">حسابي</span></a>
    </div>
  </div>
  <div class="header-nav">
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav-home">الرئيسية</a></li>
      <li><a href="products.html" data-i18n="nav-products">المنتجات</a></li>
      <li><a href="products.html?category=swords">⚔️ السيوف</a></li>
      <li><a href="products.html?category=figures">🗿 المجسمات</a></li>
      <li><a href="products.html?category=manga">📚 المانجا</a></li>
      <li><a href="login.html" data-i18n="nav-login">تسجيل الدخول</a></li>
    </ul>
    <div class="lang-switch">
      <button class="lang-btn" data-lang="ar">العربية</button>
      <button class="lang-btn" data-lang="en">English</button>
    </div>
  </div>
</header>

<main id="main-content"></main>

<footer>
  <div class="footer-content">
    <div class="footer-contact"><span>📱 واتساب: <a href="https://wa.me/201149243249" target="_blank" rel="noopener">01149243249</a></span></div>
    <div class="footer-links">
      <a href="index.html" data-i18n="nav-home">الرئيسية</a>
      <a href="products.html" data-i18n="nav-products">المنتجات</a>
      <a href="cart.html" data-i18n="nav-cart">السلة</a>
      <a href="login.html" data-i18n="nav-login">تسجيل الدخول</a>
      <a href="signup.html" data-i18n="nav-signup">إنشاء حساب</a>
    </div>
    <p>© 2026 World Of Anime — All Rights Reserved</p>
  </div>
</footer>

<script src="../js/data.js"></script>
<script>
  function renderWishlist() {
    const main = document.getElementById('main-content');
    if (!main) return;
    const wishlist = getWishlist();
    const products = wishlist.map(id => getProductById(id)).filter(Boolean);

    if (products.length === 0) {
      main.innerHTML = `
        <div class="section-title"><h2 data-i18n="wishlist-title">${t('wishlist-title')}</h2></div>
        <div class="empty-cart">
          <div class="empty-cart-icon">❤️</div>
          <h2>${t('wishlist-empty')}</h2>
          <a href="products.html" class="btn">${t('browse-products')}</a>
        </div>`;
      return;
    }

    main.innerHTML = `
      <div class="section-title"><h2 data-i18n="wishlist-title">${t('wishlist-title')}</h2></div>
      <div class="wishlist-grid">
        ${products.map(p => `
          <div class="product-card">
            <div class="product-card-img">
              <button class="product-wishlist-btn active" data-id="${p.id}"
                onclick="event.preventDefault();toggleWishlist(${p.id});renderWishlist()">❤️</button>
              <a href="product-detail.html?id=${p.id}">
                <img src="${p.images[0]}" alt="${p.title[currentLang]}" loading="lazy">
              </a>
            </div>
            <div class="product-card-body">
              <a href="product-detail.html?id=${p.id}">
                <div class="product-card-title">${p.title[currentLang]}</div>
              </a>
              <div class="product-price-row">
                <span class="product-price">${formatPrice(p.price)}</span>
                ${p.oldPrice ? `<span class="product-old-price">${formatPrice(p.oldPrice)}</span>` : ''}
              </div>
            </div>
            <div class="product-card-actions">
              <button class="btn sm" onclick="addToCart(${p.id});toggleWishlist(${p.id});renderWishlist()">
                🛒 ${t('move-to-cart')}
              </button>
            </div>
          </div>`).join('')}
      </div>`;
  }

  window.renderWishlist = renderWishlist;
</script>
<script src="../js/script.js"></script>
</body>
</html>
