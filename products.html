<script src="../js/data.js"></script>
<script>
  let filteredProducts = [...PRODUCTS];

  // Load admin-saved products from localStorage
  (function() {
    const saved = localStorage.getItem('anime-products');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (parsed.length > 0) {
          PRODUCTS.length = 0;
          PRODUCTS.push(...parsed);
          filteredProducts = [...PRODUCTS];
        }
      } catch {}
    }
  })();

  function renderProducts() {
    const container = document.getElementById('products-container');
    if (!container) return;

    // Apply search
    const searchQuery = getUrlParam('search');
    if (searchQuery) {
      filteredProducts = PRODUCTS.filter(p =>
        p.title.ar.toLowerCase().includes(searchQuery.toLowerCase()) ||
        p.title.en.toLowerCase().includes(searchQuery.toLowerCase())
      );
    }

    // Apply category filter
    const categoryFilter = getUrlParam('category');
    if (categoryFilter) {
      filteredProducts = filteredProducts.filter(p => p.category === categoryFilter);
      const catRadio = document.querySelector(`input[name="category"][value="${categoryFilter}"]`);
      if (catRadio) catRadio.checked = true;
    }

    // Apply sort
    const sort = document.getElementById('sort-select')?.value || 'popular';
    if (sort === 'price-low') filteredProducts.sort((a, b) => a.price - b.price);
    else if (sort === 'price-high') filteredProducts.sort((a, b) => b.price - a.price);
    else if (sort === 'newest') filteredProducts.sort((a, b) => b.id - a.id);
    else filteredProducts.sort((a, b) => (b.reviews || b.reviewsCount || 0) - (a.reviews || a.reviewsCount || 0));

    container.innerHTML = filteredProducts.map(renderProductCard).join('');
    document.getElementById('results-count').textContent = `${filteredProducts.length} ${t('results')}`;
  }

  function applyFilters() {
    const category = document.querySelector('input[name="category"]:checked')?.value || '';
    const minPrice = parseFloat(document.getElementById('price-min')?.value) || 0;
    const maxPrice = parseFloat(document.getElementById('price-max')?.value) || Infinity;
    const minRating = parseFloat(document.querySelector('input[name="rating"]:checked')?.value) || 0;

    filteredProducts = PRODUCTS.filter(p => {
      if (category && p.category !== category) return false;
      if (p.price < minPrice || p.price > maxPrice) return false;
      if (p.rating < minRating) return false;
      return true;
    });

    renderProducts();
  }

  function toggleFilters() {
    document.getElementById('filter-sidebar').classList.toggle('open');
  }

  document.getElementById('sort-select')?.addEventListener('change', renderProducts);

  window.renderProducts = renderProducts;
</script>
<script src="../js/script.js"></script>
