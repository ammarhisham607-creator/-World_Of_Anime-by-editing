<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام الطلب - World Of Anime</title>
  <meta name="description" content="أتمم طلبك بسهولة - دفع عند الاستلام، شحن مجاني لكل مصر.">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<a href="#main-content" class="skip-link">تخطي للمحتوى</a>
<div class="loader hidden" id="app-loader">
  <div class="loader-core"></div>
</div>

<header>
  <div class="header-top">
    <a href="index.html" class="brand">
      <span class="brand-mark">⛩️</span>
      <span>World Of Anime</span>
    </a>
    <div class="header-actions">
      <a href="cart.html" class="header-btn">🛒 <span data-i18n="nav-cart">السلة</span><span class="cart-count empty">0</span></a>
    </div>
  </div>
  <div class="header-nav">
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav-home">الرئيسية</a></li>
      <li><a href="products.html" data-i18n="nav-products">المنتجات</a></li>
      <li><a href="cart.html" data-i18n="nav-cart">السلة</a></li>
    </ul>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="theme-toggle-btn" title="Toggle Theme" style="background:rgba(10,22,32,0.8);border:1px solid rgba(6,182,212,0.25);color:#aaa;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:1rem;transition:0.2s;">☀️</button>
      <div class="lang-switch">
        <button class="lang-btn" data-lang="ar">العربية</button>
        <button class="lang-btn" data-lang="en">English</button>
      </div>
    </div>
  </div>
</header>

<main id="main-content"></main>

<footer>
  <div class="footer-content">
    <div class="footer-contact"><span>📱 واتساب: <a href="https://wa.me/201149243249" target="_blank" rel="noopener">01149243249</a></span></div>
    <p>© 2026 World Of Anime — All Rights Reserved</p>
  </div>
</footer>

<script src="data.js"></script>
<script>
  let checkoutMap = null;
  let checkoutMarker = null;
  let selectedLat = null;
  let selectedLng = null;

  function initCheckoutMap() {
    if (checkoutMap) { checkoutMap.remove(); checkoutMap = null; }
    const mapEl = document.getElementById('checkout-map');
    if (!mapEl) return;

    checkoutMap = L.map('checkout-map').setView([30.0444, 31.2357], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 18
    }).addTo(checkoutMap);

    // Custom neon marker icon
    const neonIcon = L.divIcon({
      html: '<div style="width:20px;height:20px;background:rgba(6,182,212,0.9);border-radius:50%;border:3px solid #fff;box-shadow:0 0 12px rgba(6,182,212,0.8),0 0 24px rgba(6,182,212,0.4);"></div>',
      iconSize: [20, 20],
      iconAnchor: [10, 10],
      className: 'neon-map-marker'
    });

    checkoutMap.on('click', function(e) {
      selectedLat = e.latlng.lat.toFixed(6);
      selectedLng = e.latlng.lng.toFixed(6);

      if (checkoutMarker) checkoutMap.removeLayer(checkoutMarker);
      checkoutMarker = L.marker([e.latlng.lat, e.latlng.lng], { icon: neonIcon }).addTo(checkoutMap);

      // Update hidden fields
      const latInput = document.getElementById('checkout-lat');
      const lngInput = document.getElementById('checkout-lng');
      const statusEl = document.getElementById('map-status');
      if (latInput) latInput.value = selectedLat;
      if (lngInput) lngInput.value = selectedLng;
      if (statusEl) {
        statusEl.textContent = '✅ ' + t('location-selected') + ' (' + selectedLat + ', ' + selectedLng + ')';
        statusEl.style.color = 'var(--neon-green)';
      }
    });

    // Try to get user location
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        checkoutMap.setView([lat, lng], 14);
        selectedLat = lat.toFixed(6);
        selectedLng = lng.toFixed(6);
        if (checkoutMarker) checkoutMap.removeLayer(checkoutMarker);
        checkoutMarker = L.marker([lat, lng], { icon: neonIcon }).addTo(checkoutMap);
        const latInput = document.getElementById('checkout-lat');
        const lngInput = document.getElementById('checkout-lng');
        const statusEl = document.getElementById('map-status');
        if (latInput) latInput.value = selectedLat;
        if (lngInput) lngInput.value = selectedLng;
        if (statusEl) {
          statusEl.textContent = '📍 ' + t('location-selected');
          statusEl.style.color = 'var(--neon-green)';
        }
      }, function() {}, { timeout: 5000 });
    }

    setTimeout(() => checkoutMap.invalidateSize(), 300);
  }

  function renderCheckout() {
    const main = document.getElementById('main-content');
    if (!main) return;
    const cart = getCart();

    if (cart.length === 0) {
      main.innerHTML = `
        <div class="empty-cart">
          <div class="empty-cart-icon">🛒</div>
          <h2>${t('cart-empty')}</h2>
          <a href="products.html" class="btn">${t('browse-products')}</a>
        </div>`;
      return;
    }

    const total = getCartTotal();
    const itemsList = cart.map(item => {
      const p = getProductById(item.id);
      if (!p) return '';
      return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
        <span>${p.title[currentLang]} × ${item.quantity}</span>
        <span style="font-weight:800;">${formatPrice(p.price * item.quantity)}</span>
      </div>`;
    }).join('');

    main.innerHTML = `
      <div class="section-title"><h2 data-i18n="checkout-title">${t('checkout-title')}</h2></div>
      <div class="checkout-layout">
        <form class="checkout-form" id="checkoutForm">
          <h2 data-i18n="shipping-info">${t('shipping-info')}</h2>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="name">${t('name')}</label>
              <input type="text" id="checkout-name" required>
            </div>
            <div class="form-group">
              <label data-i18n="phone">${t('phone')}</label>
              <input type="tel" id="checkout-phone" required>
            </div>
          </div>
          <div class="form-group">
            <label data-i18n="address">${t('address')}</label>
            <textarea id="checkout-address"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="city">${t('city')}</label>
              <input type="text" id="checkout-city" required>
            </div>
            <div class="form-group">
              <label data-i18n="notes">${t('notes')}</label>
              <input type="text" id="checkout-notes">
            </div>
          </div>

          <!-- Map Location Picker -->
          <div class="map-picker-section">
            <label>📍 ${t('pick-location')}</label>
            <p class="map-hint" id="map-status">${t('location-hint')}</p>
            <div id="checkout-map" class="checkout-map-container"></div>
            <input type="hidden" id="checkout-lat" name="lat">
            <input type="hidden" id="checkout-lng" name="lng">
          </div>

          <div class="payment-method">
            <span class="payment-method-icon">💵</span>
            <div>
              <h3 data-i18n="cod">${t('cod')}</h3>
              <p data-i18n="cod-desc">${t('cod-desc')}</p>
            </div>
          </div>

          <button type="submit" class="btn block" data-i18n="place-order">
            ${t('place-order')} ✓
          </button>
        </form>

        <div class="cart-summary">
          <h2 data-i18n="cart-title">${t('cart-title')}</h2>
          ${itemsList}
          <div class="cart-summary-row" style="margin-top:12px;">
            <span data-i18n="shipping">${t('shipping')}</span>
            <span style="color:var(--success);" data-i18n="free-shipping">${t('free-shipping')}</span>
          </div>
          <div class="cart-summary-row total">
            <span data-i18n="total">${t('total')}</span>
            <span>${formatPrice(total)}</span>
          </div>
        </div>
      </div>`;

    // Init map after DOM is ready
    setTimeout(initCheckoutMap, 200);

    // Attach form submit handler
    const form = document.getElementById('checkoutForm');
    if (form) {
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('checkout-name')?.value?.trim();
        const phone = document.getElementById('checkout-phone')?.value?.trim();
        const address = document.getElementById('checkout-address')?.value?.trim();
        const city = document.getElementById('checkout-city')?.value?.trim();
        const notes = document.getElementById('checkout-notes')?.value?.trim() || '';
        const lat = document.getElementById('checkout-lat')?.value || '';
        const lng = document.getElementById('checkout-lng')?.value || '';
        const hasLocation = !!(lat && lng);

        if (!name || !phone || !city) {
          showToast(t('fill-all-fields'));
          return;
        }
        if (!address && !hasLocation) {
          showToast(currentLang === 'ar' ? 'اكتب العنوان أو حدد موقعك على الخريطة' : 'Enter address or pick location on map');
          return;
        }

        const cart = getCart();
        const total = getCartTotal();
        const user = JSON.parse(localStorage.getItem('anime-user') || 'null');
        const orderId = 'ORD-' + Date.now().toString(36).toUpperCase();

        const order = {
          id: orderId,
          userId: user?.id || null,
          email: user?.email || '',
          name, phone, address, city, notes,
          location: lat && lng ? { lat: parseFloat(lat), lng: parseFloat(lng) } : null,
          items: cart.map(item => {
            const p = getProductById(item.id);
            return { id: item.id, title: p?.title || {}, price: p?.price || 0, quantity: item.quantity, size: item.size };
          }),
          total,
          status: 'pending',
          created_at: new Date().toISOString()
        };

        // Save order
        const orders = getOrders();
        orders.push(order);
        saveOrders(orders);

        // Clear cart
        saveCart([]);

        // Show success
        main.innerHTML = `
          <div style="text-align:center;padding:60px 20px;">
            <div style="font-size:4rem;margin-bottom:16px;">✅</div>
            <h2 style="color:var(--neon-green);margin-bottom:12px;">${t('order-success')}</h2>
            <p style="color:var(--text-dim);margin-bottom:8px;">${t('order-success-desc')}</p>
            <p style="color:var(--neon-yellow);font-weight:bold;font-size:1.1rem;margin-bottom:24px;">${t('order-id')}: ${orderId}</p>
            ${lat && lng ? '<p style="color:var(--text-dim);font-size:0.9rem;margin-bottom:16px;">📍 ' + lat + ', ' + lng + '</p>' : ''}
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
              <a href="index.html" class="btn">${t('back-to-home')}</a>
              <a href="products.html" class="btn secondary">${t('continue-shopping')}</a>
            </div>
          </div>`;

        showToast(t('order-success'));
      });
    }
  }

  window.renderCheckout = renderCheckout;
</script>
<script src="script.js"></script>
</body>
</html>
