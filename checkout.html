<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إتمام الطلب - World Of Anime</title>
  <meta name="description" content="أتمم طلبك بسهولة - دفع عند الاستلام، شحن مجاني لكل مصر.">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<a href="#main-content" class="skip-link">تخطي للمحتوى</a>
<div class="loader hidden" id="app-loader">
  <div class="loader-core"></div>
</div>

<header>
  <div class="header-top">
    <a href="index.html" class="brand">
      <span class="brand-mark">⛩️</span>
      <span>World Of Anime</span>
    </a>
    <div class="header-actions">
      <a href="cart.html" class="header-btn">🛒 <span data-i18n="nav-cart">السلة</span><span class="cart-count empty">0</span></a>
    </div>
  </div>
  <div class="header-nav">
    <ul class="nav-links">
      <li><a href="index.html" data-i18n="nav-home">الرئيسية</a></li>
      <li><a href="products.html" data-i18n="nav-products">المنتجات</a></li>
      <li><a href="cart.html" data-i18n="nav-cart">السلة</a></li>
    </ul>
    <div class="lang-switch">
      <button class="lang-btn" data-lang="ar">العربية</button>
      <button class="lang-btn" data-lang="en">English</button>
    </div>
  </div>
</header>

<main id="main-content"></main>

<footer>
  <div class="footer-content">
    <div class="footer-contact"><span>📱 واتساب: <a href="https://wa.me/201149243249" target="_blank" rel="noopener">01149243249</a></span></div>
    <div class="footer-links">
      <a href="index.html" data-i18n="nav-home">الرئيسية</a>
      <a href="products.html" data-i18n="nav-products">المنتجات</a>
      <a href="cart.html" data-i18n="nav-cart">السلة</a>
      <a href="login.html" data-i18n="nav-login">تسجيل الدخول</a>
      <a href="signup.html" data-i18n="nav-signup">إنشاء حساب</a>
    </div>
    <p>© 2026 World Of Anime — All Rights Reserved</p>
  </div>
</footer>

<script src="data.js"></script>
<script>
  function renderCheckout() {
    const main = document.getElementById('main-content');
    if (!main) return;
    const cart = getCart();

    if (cart.length === 0) {
      main.innerHTML = `
        <div class="empty-cart">
          <div class="empty-cart-icon">🛒</div>
          <h2>${t('cart-empty')}</h2>
          <a href="products.html" class="btn">${t('browse-products')}</a>
        </div>`;
      return;
    }

    const total = getCartTotal();
    const itemsList = cart.map(item => {
      const p = getProductById(item.id);
      if (!p) return '';
      return `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
        <span>${p.title[currentLang]} × ${item.quantity}</span>
        <span style="font-weight:800;">${formatPrice(p.price * item.quantity)}</span>
      </div>`;
    }).join('');

    main.innerHTML = `
      <div class="section-title"><h2 data-i18n="checkout-title">${t('checkout-title')}</h2></div>
      <div class="checkout-layout">
        <form class="checkout-form" id="checkoutForm">
          <h2 data-i18n="shipping-info">${t('shipping-info')}</h2>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="name">${t('name')}</label>
              <input type="text" id="checkout-name" required>
            </div>
            <div class="form-group">
              <label data-i18n="phone">${t('phone')}</label>
              <input type="tel" id="checkout-phone" required>
            </div>
          </div>
          <div class="form-group">
            <label data-i18n="address">${t('address')}</label>
            <textarea id="checkout-address" required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="city">${t('city')}</label>
              <input type="text" id="checkout-city" required>
            </div>
            <div class="form-group">
              <label data-i18n="notes">${t('notes')}</label>
              <input type="text" id="checkout-notes">
            </div>
          </div>

          <div class="payment-method">
            <span class="payment-method-icon">💵</span>
            <div>
              <h3 data-i18n="cod">${t('cod')}</h3>
              <p data-i18n="cod-desc">${t('cod-desc')}</p>
            </div>
          </div>

          <button type="submit" class="btn block" style="padding:16px;font-size:1.1rem;" data-i18n="place-order">
            ${t('place-order')} ✓
          </button>
        </form>

        <div class="cart-summary">
          <h2 data-i18n="cart-title">${t('cart-title')}</h2>
          ${itemsList}
          <div class="cart-summary-row" style="margin-top:12px;">
            <span data-i18n="shipping">${t('shipping')}</span>
            <span style="color:var(--neon-green);" data-i18n="free-shipping">${t('free-shipping')}</span>
          </div>
          <div class="cart-summary-row total">
            <span data-i18n="total">${t('total')}</span>
            <span>${formatPrice(total)}</span>
          </div>
        </div>
      </div>`;

    // Attach submit handler (works on initial load AND language switch re-renders)
    const form = document.getElementById('checkoutForm');
    if (form) {
      form.addEventListener('submit', async e => {
        e.preventDefault();
        const cart = getCart(); if (!cart.length) return;
        const order = {
          name: document.getElementById('checkout-name')?.value,
          phone: document.getElementById('checkout-phone')?.value,
          address: document.getElementById('checkout-address')?.value,
          city: document.getElementById('checkout-city')?.value,
          notes: document.getElementById('checkout-notes')?.value || '',
          items: cart.map(i => { const p = getProductById(i.id); return {id:i.id,title:p?.title,price:p?.price,quantity:i.quantity,size:i.size}; }),
          total: getCartTotal(), status: 'pending', created_at: new Date().toISOString()
        };
        cart.forEach(i => {
          const p = PRODUCTS.find(x => x.id === i.id);
          if (p) { p.stock = Math.max(0, p.stock - i.quantity); p.sold += i.quantity; }
        });
        localStorage.setItem('anime-products', JSON.stringify(PRODUCTS));
        await saveOrder(order);
        localStorage.setItem('anime-cart','[]'); updateCartCount();
        main.innerHTML = `<div style="text-align:center;padding:48px 16px;">
          <div style="font-size:4rem;margin-bottom:16px;">🎉</div>
          <h2 style="margin-bottom:10px;">${t('order-success')}</h2>
          <p style="color:var(--text-dim);margin-bottom:20px;">${t('order-success-desc')}</p>
          <p style="margin-bottom:24px;font-weight:800;">${t('order-id')}: <span style="color:var(--neon-yellow);">${order.id}</span></p>
          <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
            <a href="index.html" class="btn">${t('back-to-home')}</a>
            <a href="products.html" class="btn outline">${t('continue-shopping')}</a>
          </div></div>`;
      });
    }
  }

  window.renderCheckout = renderCheckout;
</script>
<script src="script.js"></script>
</body>
</html>
